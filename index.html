<title>PROJECT TITAN</title>
<style>
  :root{
    --ink:#14161A; --steel:#6B7280; --line:#E1E4E8;
    --paper:#FFFFFF; --panel:#F4F5F7; --brass:#B08A2E;
    --ok:#15A05A; --okbg:#EEF9F2; --accent:#D9541F; --accentbg:#FDF0EA;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:#E3E7EC;}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--ink);padding-bottom:calc(96px + env(safe-area-inset-bottom));}
  .wrap{position:relative;max-width:820px;margin:0 auto;min-height:100vh;overflow:hidden;
    background:linear-gradient(180deg,#FDFEFF 0%,#F4F6F9 46%,#EFF2F6 100%);box-shadow:0 0 40px rgba(20,22,26,.1);}
  /* faint brand glow so the glass has depth to refract */
  .wrap::before{content:"";position:absolute;top:-140px;left:50%;transform:translateX(-50%);
    width:520px;height:360px;border-radius:50%;pointer-events:none;z-index:0;
    background:radial-gradient(closest-side,rgba(176,138,46,.18),rgba(176,138,46,0));}
  .topbar,.days,.weekbar,main,.actions,.savednote,.brand{position:relative;z-index:1;}

  .topbar{position:sticky;top:0;z-index:20;background:rgba(248,249,251,.8);-webkit-backdrop-filter:blur(22px) saturate(180%);backdrop-filter:blur(22px) saturate(180%);border-bottom:1px solid rgba(0,0,0,.06);color:var(--ink);padding:calc(14px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:12px;}
  .topbar .back{width:34px;height:34px;flex-shrink:0;border:1px solid var(--line);background:rgba(255,255,255,.7);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);color:var(--accent);border-radius:11px;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  .topbar .back.show{display:flex;}
  .topbar .eyebrow{font-size:11px;letter-spacing:.01em;color:var(--steel);font-weight:600;}
  .topbar h1{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .topbar .phase{display:block;font-size:11px;font-weight:700;letter-spacing:.01em;color:var(--brass);margin-top:2px;}
  .dark .topbar{background:rgba(18,20,24,.75);border-bottom-color:rgba(255,255,255,.08);color:#fff;}
  .dark .topbar .back{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);}

  .days{display:flex;gap:4px;margin:10px 14px 2px;padding:4px;background:rgba(120,120,128,.14);border-radius:13px;position:relative;z-index:1;}
  .days button{flex:1;font:inherit;font-size:12px;font-weight:600;padding:8px 2px;background:none;border:none;border-radius:9px;color:var(--steel);cursor:pointer;transition:all .15s;}
  .days button.active{background:#fff;color:var(--ink);font-weight:700;box-shadow:0 1px 3px rgba(20,22,26,.14);}
  .dark .days{background:rgba(255,255,255,.08);}
  .dark .days button.active{background:rgba(255,255,255,.16);color:#fff;}

  .weekbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(245,246,248,.72);-webkit-backdrop-filter:blur(14px) saturate(160%);backdrop-filter:blur(14px) saturate(160%);border-bottom:1px solid rgba(0,0,0,.05);}
  .weekbar .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);flex-shrink:0;}
  .weeks{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
  .weeks::-webkit-scrollbar{display:none;}
  .weeks button{font:inherit;font-size:13px;font-weight:700;width:34px;height:34px;flex-shrink:0;border-radius:50%;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);color:var(--steel);cursor:pointer;box-shadow:0 2px 6px rgba(20,22,26,.06);}
  .weeks button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .weeks button.deload{border-color:var(--brass);color:var(--brass);}
  .weeks button.active.deload{background:var(--brass);border-color:var(--brass);color:#fff;}

  main{padding:14px;}
  .dayhead{padding:2px 2px 12px;}
  .dayhead h2{font-size:23px;font-weight:900;text-transform:uppercase;}
  .dayhead .musc{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--steel);margin-top:2px;}

  .card{display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.65);border-radius:18px;padding:12px 14px;margin-bottom:12px;cursor:pointer;
    background:rgba(255,255,255,.6);-webkit-backdrop-filter:blur(14px) saturate(160%);backdrop-filter:blur(14px) saturate(160%);
    box-shadow:0 6px 22px rgba(20,22,26,.07),inset 0 1px 0 rgba(255,255,255,.75);transition:transform .12s,border-color .15s,box-shadow .15s;}
  .card:active{transform:scale(.99);}
  .card.done{border-color:rgba(21,160,90,.75);box-shadow:0 6px 22px rgba(21,160,90,.14),inset 0 1px 0 rgba(255,255,255,.75);}
  .card.partial{border-color:rgba(217,84,31,.7);}
  .card .equip{width:54px;height:54px;flex-shrink:0;background:linear-gradient(160deg,#FCFDFE,#E8EAEF);border:1px solid rgba(255,255,255,.85);border-radius:13px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 1px 2px rgba(255,255,255,.9),0 1px 3px rgba(20,22,26,.06);}
  .card .equip svg{width:42px;height:42px;stroke:var(--ink);fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}
  .card .equip svg .fill{fill:var(--ink);stroke:none;} .card .equip svg .soft{stroke:var(--steel);}
  .card .equip img{width:100%;height:100%;object-fit:contain;padding:5px;display:block;}
  .card .body{flex:1;min-width:0;}
  .card .idx{font-size:11px;color:var(--steel);}
  .card .nm{font-size:16px;font-weight:800;line-height:1.15;margin-top:1px;}
  .card .rp{font-size:11px;color:var(--steel);margin-top:2px;}
  .card .rp b{color:var(--ink);}
  .card .stat{flex-shrink:0;text-align:right;font-size:12px;font-weight:700;}
  .card .stat .s-done{color:var(--ok);} .card .stat .s-part{color:var(--accent);} .card .stat .s-none{color:var(--steel);font-weight:600;}
  .card .stat small{display:block;font-size:11px;color:var(--steel);font-weight:600;margin-top:2px;}

  .progress{display:flex;align-items:center;gap:10px;margin:2px 2px 16px;}
  .progress .bar{flex:1;height:8px;background:rgba(20,22,26,.06);border-radius:5px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(20,22,26,.08);}
  .progress .bar i{display:block;height:100%;background:linear-gradient(90deg,#1BB265,#15A05A);border-radius:5px;transition:width .2s;}
  .progress span{font-size:11px;color:var(--steel);font-weight:700;}

  .exhero{position:relative;border-radius:22px;overflow:hidden;background:linear-gradient(158deg,#272B34 0%,#14161A 72%);border:1px solid rgba(255,255,255,.09);
    box-shadow:0 14px 36px rgba(20,22,26,.24),inset 0 1px 0 rgba(255,255,255,.12);color:#fff;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .exhero::after{content:"";position:absolute;top:0;left:0;right:0;height:44%;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,0));}
  .exhero .big{position:relative;z-index:1;width:70px;height:70px;flex-shrink:0;background:linear-gradient(160deg,#FFFFFF,#E9EBF0);border:1px solid rgba(255,255,255,.6);border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.28);}
  .exhero .big svg{width:62px;height:62px;stroke:#14161A;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .exhero .big svg .fill{fill:#14161A;stroke:none;} .exhero .big svg .soft{stroke:#6B7280;}
  .exhero .big img{width:100%;height:100%;object-fit:contain;padding:7px;display:block;}
  .exhero h3{font-size:18px;font-weight:900;line-height:1.12;}
  .exhero .meta{font-size:11.5px;color:#C3C9D3;margin-top:5px;line-height:1.35;}
  .exhero .tgt{display:inline-block;margin-top:9px;font-size:12px;font-weight:800;letter-spacing:.03em;background:linear-gradient(180deg,#C79A33,#A87F27);color:#14161A;padding:3px 11px;border-radius:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.35);}

  .exhero .hinfo{position:relative;z-index:1;flex:1;min-width:0;}
  .swapmini{position:relative;z-index:1;flex-shrink:0;align-self:center;font:inherit;font-size:19px;font-weight:700;
    width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.32);background:rgba(255,255,255,.16);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:#fff;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.28);transition:background .15s;}
  .swapmini:active{background:rgba(255,255,255,.26);}

  .sect{border:1px solid rgba(255,255,255,.7);border-radius:18px;padding:16px;margin-bottom:16px;background:rgba(255,255,255,.55);
    -webkit-backdrop-filter:blur(12px) saturate(150%);backdrop-filter:blur(12px) saturate(150%);box-shadow:0 4px 18px rgba(20,22,26,.05),inset 0 1px 0 rgba(255,255,255,.75);}
  .sect h4{font-size:16px;font-weight:900;margin-bottom:14px;}
  .series{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:10px;}
  .serie{position:relative;border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:12px 10px 10px;text-align:center;
    background:rgba(255,255,255,.62);box-shadow:0 2px 10px rgba(20,22,26,.05),inset 0 1px 0 rgba(255,255,255,.8);}
  .serie.filled{border-color:rgba(21,160,90,.7);background:rgba(238,249,242,.85);}
  .serie .tick{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;background:#fff;border:1.5px solid var(--line);color:transparent;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(20,22,26,.12);}
  .serie.filled .tick{background:var(--ok);border-color:var(--ok);color:#fff;}
  .serie .slbl{font-size:11px;color:var(--steel);margin-bottom:6px;}
  .serie .kgwrap{display:flex;align-items:baseline;justify-content:center;gap:3px;}
  .serie input.kg{width:64px;font:inherit;font-size:22px;font-weight:800;text-align:center;border:none;border-bottom:2px solid var(--line);background:none;color:var(--ink);padding:2px 0;}
  .serie input.kg:focus{outline:none;border-bottom-color:var(--accent);}
  .serie .unit{font-size:12px;color:var(--steel);font-weight:700;}
  .serie .repwrap{margin-top:6px;font-size:11px;color:var(--steel);}
  .serie input.reps{width:34px;font:inherit;font-size:12px;font-weight:700;text-align:center;border:none;border-bottom:1px solid var(--line);background:none;color:var(--ink);}
  .serie input.reps:focus{outline:none;border-bottom-color:var(--accent);}

  .charthint{font-size:12px;color:var(--steel);text-align:center;padding:24px 8px;line-height:1.5;}
  .chart svg{width:100%;height:auto;display:block;}

  .doneWrap{display:flex;justify-content:center;margin:4px 0 22px;}
  .doneBtn{min-width:70%;font:inherit;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    padding:15px 20px;border-radius:15px;border:1px solid rgba(255,255,255,.25);background:linear-gradient(180deg,#1CB668,#128A4D);color:#fff;cursor:pointer;
    box-shadow:0 8px 22px rgba(21,160,90,.32),inset 0 1px 0 rgba(255,255,255,.35);}
  .doneBtn:active{background:linear-gradient(180deg,#149a55,#0f7a44);}

  .actions{display:flex;gap:8px;padding:0 14px 8px;}
  .actions button{flex:1;font:inherit;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:13px;border-radius:13px;
    border:1px solid rgba(20,22,26,.14);background:rgba(255,255,255,.6);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);color:var(--ink);cursor:pointer;box-shadow:0 4px 14px rgba(20,22,26,.06);}
  .actions button.primary{background:rgba(20,22,26,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-color:rgba(20,22,26,.92);color:#fff;}
  .savednote{text-align:center;font-size:10px;color:var(--steel);padding:4px 14px 22px;}
  .brand{text-align:center;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--steel);padding-bottom:24px;}
  .cardio p{font-size:13px;line-height:1.5;color:var(--steel);}
  .cardnote{font-size:12px;color:var(--steel);line-height:1.5;padding:6px 4px 4px;}

  /* swap overlay — frosted glass sheet */
  .ov{position:fixed;inset:0;z-index:50;background:rgba(18,20,24,.42);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;}
  .ov.show{display:flex;}
  .ovcard{width:100%;max-width:820px;max-height:82vh;overflow-y:auto;background:rgba(255,255,255,.8);-webkit-backdrop-filter:blur(30px) saturate(180%);backdrop-filter:blur(30px) saturate(180%);
    border-top:1px solid rgba(255,255,255,.85);box-shadow:0 -12px 44px rgba(20,22,26,.22);border-radius:26px 26px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));}
  .ovcard h3{font-size:17px;font-weight:900;}
  .ovcard .sub{font-size:12px;color:var(--steel);margin:2px 0 14px;}
  .opt{display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:10px 12px;margin-bottom:10px;cursor:pointer;
    background:rgba(255,255,255,.55);box-shadow:0 3px 12px rgba(20,22,26,.05),inset 0 1px 0 rgba(255,255,255,.7);transition:transform .1s;}
  .opt:active{transform:scale(.99);}
  .opt.cur{border-color:var(--brass);background:rgba(255,253,245,.82);}
  .opt .oq{width:52px;height:52px;flex-shrink:0;background:linear-gradient(160deg,#FCFDFE,#E8EAEF);border:1px solid rgba(255,255,255,.85);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 2px rgba(255,255,255,.9);}
  .opt .oq img{width:100%;height:100%;object-fit:contain;padding:4px;}
  .opt .oq svg{width:40px;height:40px;stroke:var(--ink);fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}
  .opt .oq svg .fill{fill:var(--ink);stroke:none;} .opt .oq svg .soft{stroke:var(--steel);}
  .opt .ob{flex:1;min-width:0;}
  .opt .on{font-size:15px;font-weight:800;}
  .opt .od{font-size:11px;color:var(--steel);margin-top:2px;}
  .opt .obtag{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--brass);}
  .ovclose{width:100%;font:inherit;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:13px;border-radius:13px;border:1px solid rgba(20,22,26,.12);background:rgba(255,255,255,.6);color:var(--steel);cursor:pointer;margin-top:4px;}

  /* engrenagem + menu de configurações */
  .topbar .gear{width:32px;height:32px;flex-shrink:0;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.14);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);color:#fff;border-radius:11px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:12px 14px;margin-bottom:10px;background:rgba(255,255,255,.55);box-shadow:0 3px 12px rgba(20,22,26,.05),inset 0 1px 0 rgba(255,255,255,.7);}
  .setrow .on{font-size:15px;font-weight:800;} .setrow .od{font-size:11px;color:var(--steel);margin-top:2px;}
  .switch{width:50px;height:30px;border-radius:20px;border:none;background:#C9CED6;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
  .switch span{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:left .2s;}
  .switch.on{background:var(--ok);} .switch.on span{left:23px;}
  .setbtn{width:100%;text-align:left;font:inherit;font-size:14px;font-weight:700;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.6);color:var(--ink);cursor:pointer;margin-bottom:10px;box-shadow:0 3px 12px rgba(20,22,26,.05);}
  .setbtn:active{transform:scale(.99);}
  .clin{width:100%;font:inherit;font-size:13px;padding:11px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.7);color:var(--ink);margin-bottom:8px;}
  .clin:focus{outline:none;border-color:var(--brass);}
  .dark .clin{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#EDEFF2;}

  /* ---------- modo escuro ---------- */
  .dark{--ink:#EDEFF2;--steel:#9AA1AC;--line:rgba(255,255,255,.14);background:#0B0C0F;}
  .dark body{background:#0B0C0F;}
  .dark .wrap{background:linear-gradient(180deg,#141619 0%,#0E0F12 100%);}
  .dark .wrap::before{background:radial-gradient(closest-side,rgba(176,138,46,.14),rgba(176,138,46,0));}
  .dark .weekbar{background:rgba(24,26,31,.72);border-bottom:1px solid rgba(255,255,255,.06);}
  .dark .weeks button{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#C3C9D3;}
  .dark .weeks button.active{background:#EDEFF2;color:#14161A;border-color:#EDEFF2;}
  .dark .weeks button.deload{border-color:var(--brass);color:var(--brass);background:rgba(255,255,255,.06);}
  .dark .weeks button.active.deload{background:var(--brass);color:#14161A;}
  .dark .card{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.09);box-shadow:0 6px 22px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);}
  .dark .card.done{border-color:rgba(21,160,90,.6);}
  .dark .card.partial{border-color:rgba(217,84,31,.6);}
  .dark .card .equip{background:linear-gradient(160deg,#F4F5F7,#E4E7EC);border-color:rgba(255,255,255,.2);}
  .dark .sect{background:rgba(255,255,255,.045);border-color:rgba(255,255,255,.09);box-shadow:0 4px 18px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);}
  .dark .serie{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);box-shadow:none;}
  .dark .serie.filled{background:rgba(21,160,90,.16);border-color:rgba(21,160,90,.5);}
  .dark .serie .tick{background:#22252d;border-color:rgba(255,255,255,.2);}
  .dark .serie input.kg{border-bottom-color:rgba(255,255,255,.2);}
  .dark .serie input.reps{border-bottom-color:rgba(255,255,255,.18);}
  .dark .actions button{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#EDEFF2;}
  .dark .actions button.primary{background:#EDEFF2;color:#14161A;border-color:#EDEFF2;}
  .dark .progress .bar{background:rgba(255,255,255,.08);}
  .dark .ov{background:rgba(0,0,0,.55);}
  .dark .ovcard{background:rgba(24,26,31,.92);border-top:1px solid rgba(255,255,255,.1);}
  .dark .opt{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);box-shadow:none;}
  .dark .opt.cur{background:rgba(176,138,46,.16);border-color:var(--brass);}
  .dark .opt .oq{background:linear-gradient(160deg,#F4F5F7,#E4E7EC);border-color:rgba(255,255,255,.2);}
  .dark .setrow{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);box-shadow:none;}
  .dark .setbtn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#EDEFF2;}
  .dark .switch{background:#3A3F48;}
  .dark .ovclose{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);}

  /* ---------- construtor de protocolo ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font:inherit;font-size:12px;font-weight:700;padding:9px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--ink);cursor:pointer;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .genbtn{width:100%;margin-top:14px;font:inherit;font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:13px;border-radius:12px;border:none;background:linear-gradient(180deg,#C79A33,#A87F27);color:#14161A;cursor:pointer;box-shadow:0 6px 18px rgba(176,138,46,.28);}
  .bex{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
  .beq{width:40px;height:40px;flex-shrink:0;background:linear-gradient(160deg,#FCFDFE,#E8EAEF);border:1px solid rgba(255,255,255,.8);border-radius:9px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .beq img{width:100%;height:100%;object-fit:contain;padding:3px;} .beq svg{width:28px;height:28px;stroke:var(--ink);fill:none;stroke-width:2.6;}
  .bnm{flex:1;min-width:0;} .bnm b{font-size:14px;font-weight:800;} .bnm span{display:block;font-size:11px;color:var(--steel);margin-top:1px;}
  .bx{flex-shrink:0;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:none;color:var(--accent);font-size:13px;font-weight:800;cursor:pointer;}
  .addex{width:100%;margin-top:10px;font:inherit;font-size:12px;font-weight:700;padding:10px;border-radius:10px;border:1px dashed var(--brass);background:#FFFDF5;color:var(--brass);cursor:pointer;}
  .dark .chip{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#EDEFF2;}
  .dark .chip.on{background:#EDEFF2;color:#14161A;border-color:#EDEFF2;}
  .dark .beq{background:linear-gradient(160deg,#F4F5F7,#E4E7EC);}
  .dark .addex{background:rgba(176,138,46,.12);}

  /* ---------- barra inferior flutuante (liquid glass) ---------- */
  .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));z-index:40;display:flex;gap:4px;width:calc(100% - 28px);max-width:520px;padding:6px;border-radius:26px;
    background:rgba(255,255,255,.72);-webkit-backdrop-filter:blur(26px) saturate(180%);backdrop-filter:blur(26px) saturate(180%);
    border:1px solid rgba(255,255,255,.7);box-shadow:0 12px 34px rgba(20,22,26,.22),inset 0 1px 0 rgba(255,255,255,.75);}
  .tabbar button{flex:1;background:none;border:none;border-radius:20px;padding:8px 4px 6px;color:var(--steel);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font:inherit;font-size:10px;font-weight:700;}
  .tabbar button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;}
  .tabbar button.active{color:var(--accent);background:rgba(217,84,31,.1);}
  .tabbar button:active{transform:scale(.94);}
  .dark .tabbar{background:rgba(28,30,36,.72);border-color:rgba(255,255,255,.1);}

  /* ---------- steppers (carga / repetições) ---------- */
  .serieG{position:relative;border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:12px 12px 8px;margin-bottom:12px;background:rgba(255,255,255,.6);box-shadow:0 3px 14px rgba(20,22,26,.05),inset 0 1px 0 rgba(255,255,255,.8);}
  .serieG.filled{border-color:rgba(21,160,90,.6);background:rgba(238,249,242,.9);}
  .serieG .stk{position:absolute;top:-9px;right:-6px;width:22px;height:22px;border-radius:50%;background:#fff;border:1.5px solid var(--line);color:transparent;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(20,22,26,.12);}
  .serieG.filled .stk{background:var(--ok);border-color:var(--ok);color:#fff;}
  .serieG .sh{font-size:11px;color:var(--steel);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .strow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .stbtn{width:46px;height:46px;flex-shrink:0;border-radius:13px;border:none;background:rgba(120,120,128,.16);color:var(--ink);font-size:24px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
  .stbtn:active{background:rgba(120,120,128,.3);transform:scale(.94);}
  .stval{min-width:110px;text-align:center;}
  .stval input{width:82px;text-align:center;font:inherit;font-weight:800;border:none;background:none;color:var(--ink);padding:0;}
  .stval input:focus{outline:none;}
  .stval .kg{font-size:30px;} .stval .rp{font-size:23px;}
  .stval span{font-size:12px;color:var(--steel);font-weight:600;margin-left:2px;}
  .kgfield{display:flex;align-items:baseline;justify-content:center;gap:5px;margin:2px auto 12px;padding:9px 18px;border-radius:14px;background:rgba(120,120,128,.1);max-width:190px;}
  .kgfield input{width:118px;text-align:center;font:inherit;font-size:34px;font-weight:800;border:none;background:none;color:var(--ink);padding:0;}
  .kgfield input:focus{outline:none;}
  .kgfield span{font-size:15px;color:var(--steel);font-weight:600;}
  .dark .kgfield{background:rgba(255,255,255,.08);}
  .dark .stbtn{background:rgba(255,255,255,.1);}
  .dark .serieG{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);}
  .dark .serieG.filled{background:rgba(21,160,90,.16);}

  /* ---------- tela de progresso ---------- */
  .bigtitle{font-size:27px;font-weight:800;letter-spacing:-.02em;padding:2px 2px 12px;}
  .statgrid{display:flex;gap:8px;margin:0 0 14px;}
  .statcard{flex:1;border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:12px;background:rgba(255,255,255,.6);box-shadow:0 3px 12px rgba(20,22,26,.05),inset 0 1px 0 rgba(255,255,255,.8);}
  .statcard .t{font-size:9.5px;color:var(--steel);font-weight:600;line-height:1.2;} .statcard .v{font-size:20px;font-weight:800;margin-top:8px;} .statcard .s{font-size:9px;color:var(--steel);margin-top:3px;}
  .dark .statcard{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);}

  /* ---------- impressão / PDF (paisagem, 1 página) ---------- */
  #printArea{display:none;}
  .pr{font-family:Helvetica,Arial,sans-serif;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pr *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pr-grid tr{page-break-inside:avoid;}
  .pr-head{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:6px;}
  .pr-title{font-size:16px;font-weight:900;letter-spacing:.03em;}
  .pr-sub{font-size:9px;color:#333;}
  .pr-grid{width:100%;border-collapse:collapse;table-layout:fixed;}
  .pr-grid th,.pr-grid td{border:1px solid #b5b5b5;padding:2px 2px;font-size:8px;text-align:center;line-height:1.1;}
  .pr-grid thead th{background:#e6e6e6;font-weight:800;font-size:7.5px;}
  .pr-grid th.ex,.pr-grid td.ex{text-align:left;width:44mm;font-size:8.5px;font-weight:700;padding-left:5px;}
  .pr-dayrow td{background:#14161A;color:#fff;text-align:left;font-weight:800;font-size:8.5px;text-transform:uppercase;letter-spacing:.04em;padding-left:5px;}
  .pr-note{font-size:8.5px;color:#333;margin-top:5px;line-height:1.4;}
  .pr-foot{margin-top:4px;font-size:8px;color:#777;text-align:center;letter-spacing:.14em;text-transform:uppercase;}

  @media print{
    html,body{background:#fff!important;}
    .wrap,.ov,.tabbar{display:none!important;}
    #printArea{display:block!important;}
    @page{size:A4 landscape;margin:8mm;}
  }
</style>
</head>

    <div style="flex:1;min-width:0;">
      <div class="eyebrow">Project Titan &middot; Recomposi&ccedil;&atilde;o 12 semanas</div>

function altsOf(mus, self){
  const pool=(A[mus]||[]).slice();
  // move current exercise to front and tag; ensure it's present
  const list=[]; const seen=new Set();
  const cur=pool.find(x=>x.i===self.i) || {n:self.n,i:self.i,note:self.note};
  list.push(cur); seen.add(cur.i);
  pool.forEach(x=>{if(!seen.has(x.i)){list.push(x);seen.add(x.i);}});
  return list;
}

function exAt(day,idx){
  const base=WORKOUTS[day].ex[idx];

}

function statusOf(day,week,ex){const c=log?.[day]?.[week]?.[ex.n];const total=setsOf(ex.reps[phaseOf(week)]);let f=0;if(c&&c.series)c.series.forEach(s=>{if((s.kg||'').trim())f++;});return{f,total};}

function stepReps(s,d){ const e=exAt(state.day,state.ex); const c=cell(state.day,state.week,e.n); c.series[s]=c.series[s]||{kg:'',reps:''}; var m=String(c.series[s].reps||'').match(/\d+/); var v=(m?parseInt(m[0]):0)+d; if(v<0)v=0; c.series[s].reps=String(v); save(); renderDetail(); }

/* ---------- tela de Progresso ---------- */
function _weekAgg(w){ var ton=0,filled=0,doneEx=0,totalEx=0;
  DAYS.forEach(function(d){ var Wk=WORKOUTS[d]; if(!Wk||Wk.isCardio)return;
    Wk.ex.forEach(function(_,idx){ var e=exAt(d,idx); totalEx++; var setsTgt=setsOf(e.reps[phaseOf(w)]); var c=(log&&log[d]&&log[d][w])?log[d][w][e.n]:null; var f=0;
      if(c&&c.series){ c.series.forEach(function(x){ if(String(x.kg||'').trim()){ filled++; f++; var kg=parseFloat(String(x.kg).replace(',','.'))||0; var mm=String(x.reps||'').match(/\d+/); var rp=mm?parseInt(mm[0]):0; ton+=kg*rp; } }); }
      if(setsTgt>0&&f>=setsTgt)doneEx++;
    });
  });
  return {ton:ton,filled:filled,doneEx:doneEx,totalEx:totalEx};
}
function _fmtTon(t){ return t>=1000?((t/1000).toFixed(1).replace('.',',')+' t'):(Math.round(t)+' kg'); }
function tonChartSVG(){
  var pts=[]; for(var w=1;w<=12;w++){ var a=_weekAgg(w); if(a.ton>0)pts.push({w:w,v:a.ton}); }
  if(!pts.length) return '<div class="charthint">Registre suas cargas para ver o volume semanal evoluir aqui.</div>';
  var W=340,H=180,pL=40,pR=16,pT=16,pB=30,iW=W-pL-pR,iH=H-pT-pB,base=pT+iH,n=pts.length;
  var xF=function(i){return n===1?pL+iW/2:pL+iW*i/(n-1);};
  var lo=Math.min.apply(null,pts.map(function(p){return p.v;})),hi=Math.max.apply(null,pts.map(function(p){return p.v;}));
  lo=Math.max(0,lo-(hi-lo)*0.15); hi+=(hi-lo)*0.12||1;
  var yF=function(v){return pT+iH*(1-(v-lo)/((hi-lo)||1));};
  var line=pts.map(function(p,i){return xF(i).toFixed(1)+','+yF(p.v).toFixed(1);}).join(' ');
  var area='M '+xF(0).toFixed(1)+','+base+' L '+pts.map(function(p,i){return xF(i).toFixed(1)+','+yF(p.v).toFixed(1);}).join(' L ')+' L '+xF(n-1).toFixed(1)+','+base+' Z';
  var xl=''; pts.forEach(function(p,i){ xl+='<text x="'+xF(i).toFixed(1)+'" y="'+(H-12)+'" text-anchor="middle" font-size="10" fill="#9AA1AC">S'+p.w+'</text>'; });
  var dots=''; pts.forEach(function(p,i){ dots+='<circle cx="'+xF(i).toFixed(1)+'" cy="'+yF(p.v).toFixed(1)+'" r="4" fill="#D9541F" stroke="#fff" stroke-width="2"/>'; });
  return '<svg viewBox="0 0 '+W+' '+H+'"><path d="'+area+'" fill="rgba(217,84,31,.12)"/><polyline points="'+line+'" fill="none" stroke="#D9541F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+dots+xl+'</svg>';
}
function renderProgress(){
  document.getElementById('topTitle').childNodes[0].nodeValue='Progresso';

function repsFor(mus,goal){
  const iso=['quadIso','calf','latDelt','rearDelt','abs','lowback','bi','tri'].indexOf(mus)>=0;
  if(goal==='forca') return iso?R('3×8','3×6','3×8'):R('4×5','4×4','5×3');
  if(goal==='resistencia') return iso?R('3×15','3×18','3×20'):R('3×12','3×15','3×12');
  return iso?R('3×12','3×15','3×12'):R('4×8','4×6','4×8');
}
function _shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function _eqCat(i){var p=String(i).split('_')[0];return ({bb:'barra',db:'halter',cbl:'cabo',bw:'corpo'})[p]||'maquina';}
function _isComp(o){return /press|squat|agachamento|remada|\brow\b|puxada|pulldown|terra|deadlift|afundo|lunge|búlgaro|bulgar|\bdip\b|barra fixa|chin|hip thrust|elevação pélvica|leg press|desenvolvimento|good morning|pullover/i.test(o.n);}
/* escolhe n exercícios que se completam: 1 composto primeiro, depois variando equipamento/ângulo */
function _pickN(mus,n,usedG){
  var pool=(A[mus]||[]).slice();
  var avail=pool.filter(function(o){return !usedG.has(o.i);});
  if(avail.length<n) avail=pool.slice();
  var comps=_shuffle(avail.filter(_isComp));
  var isos=_shuffle(avail.filter(function(o){return !_isComp(o);}));
  var chosen=[];
  if(comps.length) chosen.push(comps.shift());
  var rest=_shuffle(isos.concat(comps));
  while(chosen.length<n && rest.length){
    var lastCat=chosen.length?_eqCat(chosen[chosen.length-1].i):null;
    var idx=rest.findIndex(function(o){return _eqCat(o.i)!==lastCat;});
    if(idx<0) idx=0;
    var o=rest.splice(idx,1)[0];
    if(!chosen.some(function(c){return c.i===o.i;})) chosen.push(o);
  }
  chosen.forEach(function(o){usedG.add(o.i);});
  return chosen;
}
function genDraft(){

  var days=T.days.map(function(d,di){

      _pickN(mus,n,usedG).forEach(function(o){ex.push({n:o.n,i:o.i,mus:mus,note:o.note,reps:repsFor(mus,builderCfg.goal)});});
    });
    return {key:'d'+(di+1),title:d.t,day:d.d,musc:musset.map(function(m){return MUS_LABEL[m].split(' ')[0];}).join(' · '),ex:ex};
  });
  draft={days:days};
}

}

function chartSVG(name){
  const pts=[];
  for(let w=1;w<=12;w++){const t=topSet(state.day,w,name);if(t!==null)pts.push({w,kg:t});}
  if(pts.length===0)return `<div class="charthint">Registre a carga das séries ao longo das semanas para ver sua evolução aparecer aqui.</div>`;
  const W=340,H=200,pL=40,pR=16,pT=18,pB=34,iW=W-pL-pR,iH=H-pT-pB,base=pT+iH;
  const n=pts.length;
  const xF=i=>n===1?pL+iW/2:pL+iW*i/(n-1);
  let lo=Math.min(...pts.map(p=>p.kg)),hi=Math.max(...pts.map(p=>p.kg));
  if(lo===hi){lo-=2;hi+=2;}else{const pad=(hi-lo)*0.18;lo-=pad;hi+=pad;}
  const yF=v=>pT+iH*(1-(v-lo)/(hi-lo));
  const line=pts.map((p,i)=>`${xF(i).toFixed(1)},${yF(p.kg).toFixed(1)}`).join(' ');
  const area=`M ${xF(0).toFixed(1)},${base} L `+pts.map((p,i)=>`${xF(i).toFixed(1)},${yF(p.kg).toFixed(1)}`).join(' L ')+` L ${xF(n-1).toFixed(1)},${base} Z`;
  const yticks=[hi,(hi+lo)/2,lo];
  let g='';
  yticks.forEach(v=>{const y=yF(v).toFixed(1);g+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#EFF1F3"/><text x="${pL-6}" y="${(+y+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#9AA1AC">${Math.round(v)}</text>`;});
  let xl='';pts.forEach((p,i)=>{xl+=`<text x="${xF(i).toFixed(1)}" y="${H-14}" text-anchor="middle" font-size="10" fill="#9AA1AC">S${p.w}</text>`;});
  let dots='';pts.forEach((p,i)=>{dots+=`<circle cx="${xF(i).toFixed(1)}" cy="${yF(p.kg).toFixed(1)}" r="4" fill="#D9541F" stroke="#fff" stroke-width="2"/>`;
    if(n<=6)dots+=`<text x="${xF(i).toFixed(1)}" y="${(yF(p.kg)-9).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#D9541F">${p.kg}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}"><path d="${area}" fill="rgba(217,84,31,.12)"/>${g}<polyline points="${line}" fill="none" stroke="#D9541F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}${xl}</svg>`;
}

function resetWeek(){
  const wk=WORKOUTS[state.day];if(wk.isCardio)return;
  if(!confirm(`Limpar anotações de ${wk.title} · Semana ${state.week}?`))return;
  if(log?.[state.day])delete log[state.day][state.week];save();render();
}
function concludeWeek(){
  if(state.week<12) state.week++;
  state.view='list';window.scrollTo(0,0);render();
}

/* ---------- tema (modo escuro) ---------- */
const TKEY='titan_theme_v1';
function loadTheme(){try{return localStorage.getItem(TKEY)||'light';}catch(e){return 'light';}}
function applyTheme(t){document.documentElement.classList.toggle('dark', t==='dark');}
let theme=loadTheme(); applyTheme(theme);
function toggleTheme(){
  theme=(theme==='dark'?'light':'dark');
  applyTheme(theme);
  try{localStorage.setItem(TKEY,theme);}catch(e){}
  touch();
  if(document.getElementById('ov2').classList.contains('show'))openSettings();
}

/* ---------- menu de configurações ---------- */
function openSettings(){
  const dark=document.documentElement.classList.contains('dark');
  let h=`<h3>Configurações</h3><div class="sub">Project Titan · versão 13 · preferências e backup.</div>`;
  h+=`<div class="setrow"><div><div class="on">Modo escuro</div><div class="od">Tema escuro para treinar com pouca luz</div></div>
      <button class="switch ${dark?'on':''}" onclick="toggleTheme()"><span></span></button></div>`;
  h+=`<button class="setbtn" onclick="exportBackup()">⤓  Exportar backup (.json)</button>`;
  h+=`<button class="setbtn" onclick="document.getElementById('importFile').click()">⤒  Importar backup</button>`;
  h+=`<div class="od" style="margin:2px 4px 14px">Trocou de celular? Exporte o backup no aparelho antigo e importe no novo — cargas, gráficos e trocas de exercício vão junto.</div>`;
  h+=`<button class="setbtn" onclick="newProtocol()">🧩  Novo protocolo (montar treinos)</button>`;
  h+=`<button class="setbtn" style="border-color:rgba(217,84,31,.5);color:var(--accent)" onclick="clearAll()">🗑  Limpar tudo (cargas + trocas)</button>`;
  h+=`<div class="od" style="margin:2px 4px 12px">Novo protocolo abre o construtor para montar/gerar novos treinos (não apaga seus dados). Limpar tudo apaga cargas e trocas.</div>`;
  var cc=cloudCfg();
  h+=`<div style="height:1px;background:var(--line);margin:6px 0 12px"></div>`;
  h+=`<div class="on" style="margin:0 2px 3px">☁ Sincronização na nuvem</div>`;
  h+=`<div class="od" style="margin:0 2px 10px">Ligada automaticamente. Seus dados ficam salvos online e voltam sozinhos se o app for limpo. Cada pessoa tem seu próprio código — ninguém vê os dados do outro.</div>`;
  h+=`<div class="od" style="margin:0 2px 4px"><b>Seu código</b> (guarde para usar nos seus outros aparelhos):</div>`;
  h+=`<input id="cl_code" class="clin" value="${(cc.code||'').replace(/"/g,'&quot;')}">`;
  h+=`<div style="display:flex;gap:8px"><button class="setbtn" style="margin:0;flex:1" onclick="cloudCopyCode()">Copiar código</button><button class="setbtn" style="margin:0;flex:1" onclick="cloudApplyCode()">Usar este código</button></div>`;
  h+=`<div style="display:flex;gap:8px;margin-top:8px"><button class="setbtn" style="margin:0;flex:1" onclick="cloudDoPush()">↑ Enviar agora</button><button class="setbtn" style="margin:0;flex:1" onclick="cloudDoPull()">↓ Baixar agora</button></div>`;
  h+=`<div class="od" id="cl_status" style="margin:8px 2px 14px">Sincronização ativa.</div>`;
  h+=`<button class="ovclose" onclick="closeSettings()">Fechar</button>`;
  document.getElementById('ovcard2').innerHTML=h;
  document.getElementById('ov2').classList.add('show');
}
function closeSettings(){document.getElementById('ov2').classList.remove('show');}
document.getElementById('ov2').addEventListener('click',e=>{if(e.target.id==='ov2')closeSettings();});

function exportBackup(){
  const data={app:'project-titan',version:4,exportedAt:new Date().toISOString(),theme:loadTheme(),log:log,picks:picks};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='project-titan-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},1500);
}
document.getElementById('importFile').addEventListener('change',function(){
  if(this.files&&this.files[0])importBackup(this.files[0]);
  this.value='';
});
function newProtocol(){ closeSettings(); openBuilder(); }
function clearAll(){
  if(!confirm('Limpar TUDO?\n\nApaga registros de carga E trocas de aparelho, voltando o app ao padrão. Não dá para desfazer.\nExporte um backup antes se quiser guardar.'))return;
  log={}; picks={}; state.week=1; state.day='legs'; state.view='list';
  try{localStorage.setItem(KEY,JSON.stringify(log));localStorage.setItem(PKEY,JSON.stringify(picks));}catch(e){}
  closeSettings(); render(); touch(); alert('Tudo limpo. App no padrão.');
}

/* ================= SINCRONIZAÇÃO NA NUVEM (Netlify Functions + Blobs) ================= */
const CKEY='titan_cloud_v1', TSKEY='titan_ts', CLOUD_URL='/.netlify/functions/sync';
function cloudCfg(){ try{return JSON.parse(localStorage.getItem(CKEY))||{};}catch(e){return{};} }
function cloudSet(c){ try{localStorage.setItem(CKEY,JSON.stringify(c));}catch(e){} }
function localTs(){ return +(localStorage.getItem(TSKEY)||0); }
function setLocalTs(t){ try{localStorage.setItem(TSKEY,String(t));}catch(e){} }
function _genCode(){ var s='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',x=''; for(var i=0;i<16;i++)x+=s.charAt(Math.floor(Math.random()*s.length)); return x; }
function ensureCode(){ var c=cloudCfg(); if(!c.code){ c.code=_genCode(); } c.on=true; cloudSet(c); return c.code; }
function touch(){ setLocalTs(Date.now()); cloudAutoPush(); }
function _prog(){ try{return JSON.parse(localStorage.getItem(PROGKEY));}catch(e){return null;} }
function snapshot(){ return {log:log,picks:picks,program:_prog(),theme:loadTheme(),_ts:localTs()||Date.now()}; }
function applySnapshot(p){
  if(!p) return;
  log=p.log||{}; picks=p.picks||{};
  try{localStorage.setItem(KEY,JSON.stringify(log));localStorage.setItem(PKEY,JSON.stringify(picks));}catch(e){}
  if(p.program&&p.program.workouts&&p.program.days&&p.program.days.length){ WORKOUTS=p.program.workouts; DAYS=p.program.days; try{localStorage.setItem(PROGKEY,JSON.stringify(p.program));}catch(e){} }
  else { try{localStorage.removeItem(PROGKEY);}catch(e){} WORKOUTS=DEFAULT_WORKOUTS; DAYS=DEFAULT_DAYS.slice(); }
  if(p.theme){ theme=p.theme; applyTheme(theme); try{localStorage.setItem(TKEY,theme);}catch(e){} }
  setLocalTs(p._ts||Date.now());
  if(DAYS.indexOf(state.day)<0)state.day=DAYS[0];
  buildTabs();
}
function cloudPush(){
  var c=cloudCfg(); if(!c.code) return Promise.reject(new Error('sem código'));
  return fetch(CLOUD_URL+'?code='+encodeURIComponent(c.code),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(snapshot())}).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return true; });
}
function cloudPull(){
  var c=cloudCfg(); if(!c.code) return Promise.reject(new Error('sem código'));
  return fetch(CLOUD_URL+'?code='+encodeURIComponent(c.code)).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(function(p){ return p||null; });
}
var _cloudTimer=null;
function cloudAutoPush(){ var c=cloudCfg(); if(!c.on||!c.code) return; clearTimeout(_cloudTimer); _cloudTimer=setTimeout(function(){ cloudPush().catch(function(){}); },1500); }
function cloudSyncOnOpen(){
  var c=cloudCfg(); if(!c.on||!c.code) return;
  cloudPull().then(function(p){
    if(p && (p._ts||0)>localTs()){ applySnapshot(p); render(); }
    else { cloudPush().catch(function(){}); }
  }).catch(function(){});
}
function _clStat(m){ var e=document.getElementById('cl_status'); if(e)e.textContent=m; }
function cloudCopyCode(){ var e=document.getElementById('cl_code'); if(!e)return; try{ e.focus(); e.select&&e.select(); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(e.value); _clStat('Código copiado.'); } else { document.execCommand&&document.execCommand('copy'); _clStat('Código copiado.'); } }catch(_){ _clStat('Selecione o código e copie manualmente.'); } }
function cloudApplyCode(){ var e=document.getElementById('cl_code'); var v=e?String(e.value).trim():''; if(v.length<6){ _clStat('Código muito curto.'); return; } var c=cloudCfg(); c.code=v; c.on=true; cloudSet(c); _clStat('Buscando dados deste código…');
  cloudPull().then(function(p){ if(p){ applySnapshot(p); render(); openSettings(); _clStat('Dados deste código carregados. ✓'); } else { setLocalTs(Date.now()); return cloudPush().then(function(){ openSettings(); _clStat('Código pronto — seus dados serão salvos nele.'); }); } }).catch(function(err){ _clStat('Erro: '+err.message); }); }
function cloudDoPush(){ setLocalTs(Date.now()); _clStat('Enviando…'); cloudPush().then(function(){ _clStat('Enviado para a nuvem. ✓'); }).catch(function(e){ _clStat('Erro: '+e.message+' (publique a função no Netlify)'); }); }
function cloudDoPull(){ _clStat('Baixando…'); cloudPull().then(function(p){ if(p){ applySnapshot(p); render(); openSettings(); _clStat('Baixado da nuvem. ✓'); } else _clStat('Nada salvo ainda para este código.'); }).catch(function(e){ _clStat('Erro: '+e.message); }); }

function importBackup(file){
  const r=new FileReader();
  r.onload=function(){
    let d; try{ d=JSON.parse(r.result); }catch(e){ alert('Arquivo inválido. Selecione um backup .json exportado pelo app.'); return; }
    if(!d||typeof d!=='object'||(d.log===undefined&&d.picks===undefined)){ alert('Este arquivo não parece ser um backup do Project Titan.'); return; }
    if(!confirm('Importar este backup? Isso substitui os dados atuais neste aparelho.')) return;
    log=d.log||{}; picks=d.picks||{};
    try{localStorage.setItem(KEY,JSON.stringify(log));localStorage.setItem(PKEY,JSON.stringify(picks));}catch(e){}
    if(d.theme){theme=d.theme;applyTheme(theme);try{localStorage.setItem(TKEY,theme);}catch(e){}}
    closeSettings(); state.view='list'; render();
    touch();
    alert('Backup importado com sucesso.');
  };
  r.readAsText(file);
}

  let h=`<div class="pr"><div class="pr-head"><span class="pr-title">PROJECT TITAN</span>`
   +`<span class="pr-sub">Registro de carga máxima por semana (kg) — Push / Pull / Legs / Upper · bloco de 12 semanas</span></div>`;
  h+=`<table class="pr-grid"><thead>`
   +`<tr><th class="ex" rowspan="2">Exercício</th><th colspan="12">Carga Máx. Semana (kg)</th></tr><tr>`;
  for(let w=1;w<=12;w++) h+=`<th>S${w}</th>`;
  h+=`</tr></thead><tbody>`;
  DAYS.filter(function(d){return d!=='cardio'&&d!=='extras';}).forEach(d=>{
    const wk=WORKOUTS[d];
    h+=`<tr class="pr-dayrow"><td colspan="13">${wk.title} — ${wk.day} · ${wk.musc}</td></tr>`;
    wk.ex.forEach((_,idx)=>{
      const e=exAt(d,idx);
      h+=`<tr><td class="ex">${e.n}</td>`;
      for(let w=1;w<=12;w++){const t=topSet(d,w,e.n); h+=`<td>${t!=null?t:''}</td>`;}
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table>`;
  h+=`<div class="pr-note"><b>Cardio:</b> Quarta — Futebol · Sexta/Domingo — Bike Zona 2 (30–45 min, RPE 3–4) · 8–10 mil passos/dia.&nbsp;&nbsp;`
   +`<b>Fases (RIR):</b> Sem 1–4: 2–3 · 5–8: 1–2 · 9–11: 0–1 · 12: Deload.</div>`;
  h+=`<div class="pr-foot">Foco · Disciplina · Evolução</div></div>`;
  document.getElementById('printArea').innerHTML=h;
}
